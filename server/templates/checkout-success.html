<!doctype html>
<html lang="en">
  <head>
    <title>Payment Successful - Probaly</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A237E" />
    <link rel="icon" href="/assets/images/icon.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
        background: #0A0E1A;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 440px;
        width: 100%;
        margin: 24px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 48px 32px;
        text-align: center;
      }
      .icon-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(16, 185, 129, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .checkmark {
        width: 40px;
        height: 40px;
        color: #10B981;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #fff 0%, #B0BEC5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        font-size: 16px;
        color: #90A4AE;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .btn {
        display: inline-block;
        padding: 14px 32px;
        background: linear-gradient(135deg, #1A237E 0%, #3949AB 100%);
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(26, 35, 126, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-circle">
        <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1>Welcome to Premium!</h1>
      <p class="subtitle">
        Your payment was successful. You now have full access to all AI-powered predictions, live updates, and premium features.
      </p>
      <a href="/app" class="btn">Open Probaly</a>
    </div>
  </body>
</html>
