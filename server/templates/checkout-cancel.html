<!doctype html>
<html lang="en">
  <head>
    <title>Payment Cancelled - Probaly</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A237E" />
    <link rel="icon" href="/assets/images/icon.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
        background: #0A0E1A;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 440px;
        width: 100%;
        margin: 24px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 48px 32px;
        text-align: center;
      }
      .icon-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(245, 158, 11, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon {
        width: 40px;
        height: 40px;
        color: #F59E0B;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #fff 0%, #B0BEC5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        font-size: 16px;
        color: #90A4AE;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .btn {
        display: inline-block;
        padding: 14px 32px;
        background: linear-gradient(135deg, #1A237E 0%, #3949AB 100%);
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        transition: transform 0.15s, box-shadow 0.15s;
        margin-right: 12px;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(26, 35, 126, 0.4);
      }
      .btn-secondary {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        margin-right: 0;
      }
      .btn-secondary:hover {
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      .buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-circle">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </div>
      <h1>Payment Cancelled</h1>
      <p class="subtitle">
        No worries! Your payment was not processed. You can try again anytime or continue using the free daily tip.
      </p>
      <div class="buttons">
        <a href="/app" class="btn">Back to App</a>
        <a href="/" class="btn btn-secondary">Home</a>
      </div>
    </div>
  </body>
</html>
