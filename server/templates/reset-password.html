<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<title>Reset your Probaly password</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #1A237E 0%, #0F1547 100%);
    color: #1F2937;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .brand { font-size: 14px; letter-spacing: 2px; font-weight: 700; color: #1A237E; text-transform: uppercase; margin-bottom: 8px; }
  h1 { margin: 0 0 8px; font-size: 24px; color: #1A237E; }
  p.sub { margin: 0 0 24px; font-size: 14px; color: #6B7280; line-height: 1.5; }
  label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid #D1D5DB;
    border-radius: 10px;
    background: #F9FAFB;
    margin-bottom: 16px;
    -webkit-appearance: none;
  }
  input[type="password"]:focus { outline: none; border-color: #1A237E; background: #ffffff; }
  button {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    background: #E53935;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:disabled { opacity: .55; cursor: not-allowed; }
  .msg { margin-top: 16px; padding: 12px 14px; border-radius: 10px; font-size: 14px; line-height: 1.45; display: none; }
  .msg.error { background: #FEE2E2; color: #991B1B; display: block; }
  .msg.success { background: #D1FAE5; color: #065F46; display: block; }
  .footer { margin-top: 20px; text-align: center; font-size: 13px; color: #6B7280; }
  .footer a { color: #1A237E; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Probaly</div>
  <h1>Reset your password</h1>
  <p class="sub">Choose a new password. It must be at least 6 characters long. After resetting, sign in on the app with your new password.</p>
  <form id="resetForm" autocomplete="off">
    <label for="password">New password</label>
    <input id="password" type="password" minlength="6" maxlength="128" required autocomplete="new-password" />
    <label for="confirm">Confirm new password</label>
    <input id="confirm" type="password" minlength="6" maxlength="128" required autocomplete="new-password" />
    <button id="submitBtn" type="submit">Reset password</button>
    <div id="msg" class="msg"></div>
  </form>
  <div class="footer"><a href="/">Back to Probaly</a></div>
</div>
<script>
(function () {
  var form = document.getElementById("resetForm");
  var pw = document.getElementById("password");
  var cf = document.getElementById("confirm");
  var btn = document.getElementById("submitBtn");
  var msg = document.getElementById("msg");
  var params = new URLSearchParams(window.location.search);
  var token = params.get("token") || "";

  function showMsg(text, kind) {
    msg.textContent = text;
    msg.className = "msg " + kind;
  }

  if (!token) {
    btn.disabled = true;
    showMsg("This reset link is missing its token. Please open the link from your email again.", "error");
    return;
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (pw.value !== cf.value) {
      showMsg("Passwords do not match.", "error");
      return;
    }
    if (pw.value.length < 6) {
      showMsg("Password must be at least 6 characters.", "error");
      return;
    }
    btn.disabled = true;
    btn.textContent = "Resetting...";
    showMsg("", "");
    fetch("/api/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: token, password: pw.value }),
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (resp) {
        if (resp.ok && resp.j && resp.j.success) {
          showMsg("Your password has been reset. You can now sign in on the Probaly app with your new password.", "success");
          form.querySelectorAll("input").forEach(function (i) { i.disabled = true; });
          btn.style.display = "none";
        } else {
          btn.disabled = false;
          btn.textContent = "Reset password";
          showMsg((resp.j && resp.j.error) || "Could not reset password. Please request a new link.", "error");
        }
      })
      .catch(function () {
        btn.disabled = false;
        btn.textContent = "Reset password";
        showMsg("Network error. Please try again.", "error");
      });
  });
})();
</script>
</body>
</html>
